<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abel Thomas Jacob | Portfolio</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --main-color: #00ffff;
            --bg-color: #080808;
            --card-bg: rgba(255, 255, 255, 0.03);
            --text-color: #ffffff;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Poppins', sans-serif; 
            text-decoration: none; 
            scroll-behavior: smooth; 
        }

        body { 
            background: var(--bg-color); 
            color: var(--text-color); 
            overflow-x: hidden; 
        }

        /* --- BACKGROUND & LOADER --- */
        #particles-js { 
            position: fixed; 
            inset: 0; 
            z-index: -1; 
        }

        .cursor-glow { 
            position: fixed; 
            width: 400px; 
            height: 400px; 
            background: radial-gradient(circle, rgba(0,255,255,0.08) 0%, transparent 70%); 
            border-radius: 50%; 
            pointer-events: none; 
            transform: translate(-50%, -50%); 
            z-index: 9999; 
        }

        #loader { 
            position: fixed; 
            inset: 0; 
            background: #000; 
            z-index: 10000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            transition: 0.6s ease; 
        }

        .loader-content h1 { 
            font-size: 3rem; 
            color: var(--main-color); 
            text-shadow: 0 0 20px var(--main-color); 
            letter-spacing: 5px; 
        }

        /* --- NAVIGATION --- */
        header { 
            position: fixed; 
            top: 0; 
            width: 100%; 
            padding: 1.5rem 9%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 100; 
            background: rgba(0,0,0,0.7); 
            backdrop-filter: blur(10px); 
        }

        .logo { font-size: 2.2rem; color: #fff; font-weight: 700; }
        .logo span, .logo i { color: var(--main-color); }

        nav a { 
            font-size: 1.1rem; 
            color: #fff; 
            margin-left: 2.5rem; 
            transition: 0.3s; 
            font-weight: 500;
        }

        nav a:hover { 
            color: var(--main-color); 
            text-shadow: 0 0 10px var(--main-color); 
        }

        /* --- SECTIONS --- */
        section { 
            min-height: 100vh; 
            padding: 10rem 9% 5rem; 
        }

        .heading { 
            text-align: center; 
            font-size: 3.5rem; 
            margin-bottom: 4rem; 
        }

        .heading span { color: var(--main-color); }

        /* --- HOME --- */
        .home { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            gap: 2rem; 
        }

        .home-content h1 { font-size: 4.5rem; line-height: 1.2; }
        .home-content span { color: var(--main-color); }

        .typing-text { font-size: 2rem; margin: 1rem 0; font-weight: 600; }
